<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuroro Beast Illustrations — Full Inventory</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e0e0e0; font-family:'Inter',sans-serif; padding:20px; }
h1 { text-align:center; color:#f0c040; font-size:2em; margin:20px 0; }
.subtitle { text-align:center; color:#888; margin-bottom:30px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; max-width:1400px; margin:0 auto; }
.card { background:#16161f; border:1px solid #2a2a3a; border-radius:12px; padding:10px; text-align:center; transition:transform .2s, border-color .2s; cursor:pointer; }
.card:hover { transform:translateY(-4px); border-color:#f0c040; }
.card img { width:100%; max-width:120px; height:auto; image-rendering:auto; margin:0 auto; display:block; }
.card .id { color:#f0c040; font-size:.75em; font-weight:600; margin-top:6px; }
.card .name { color:#fff; font-size:.85em; font-weight:600; margin-top:2px; }
.card .elements { color:#888; font-size:.7em; margin-top:2px; }
.stats { text-align:center; color:#888; margin:20px 0; font-size:.9em; }
</style>
</head>
<body>

<p class="subtitle">All 117 entries from the Kuropedia (kuroro.com/kuropedia)</p>
<p class="stats" id="stats"></p>
<div class="grid" id="grid"></div>

const grid = document.getElementById("grid");
beasts.forEach(b => {
  const stage = parseInt(b.id) <= 27 ? 
    ((parseInt(b.id)-1)%9 === 0 ? "Stage 1" : (parseInt(b.id)-1)%9 < 4 ? "Stage 2" : "Stage 3") :
    ((parseInt(b.id)-1)%3 === 0 ? "Stage 1" : (parseInt(b.id)-1)%3 === 1 ? "Stage 2" : "Stage 3");
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<img src="https://www.kuroro.com/images/beasts/${b.id}.png" alt="${b.name}" loading="lazy"><div class="id">#${b.id} · ${stage}</div><div class="name">${b.name}</div><div class="elements">${b.el}</div>`;
  grid.appendChild(card);
});

</html>
