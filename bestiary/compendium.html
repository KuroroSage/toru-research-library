<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh}
.hero{text-align:center;padding:50px 20px 30px;background:linear-gradient(180deg,#12121f 0%,#0a0a0f 100%)}
.hero h1{font-size:2.2em;color:#f0c040;letter-spacing:2px;margin-bottom:8px}
.hero p{color:#88a;font-size:1em;margin-bottom:6px}
.hero .count{color:#f0c040;font-size:.85em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;max-width:1400px;margin:0 auto;padding:20px}
.card{background:#12121f;border:1px solid #1a1a2e;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s}
.card:hover{transform:translateY(-6px);border-color:#f0c040;box-shadow:0 8px 30px rgba(240,192,64,.15)}
.card img{width:100%;aspect-ratio:1;object-fit:contain;background:#0e0e1a;padding:12px}
.card .info{padding:12px 14px 14px;border-top:1px solid #1a1a2e}
.card .name{font-weight:700;font-size:1em;color:#fff}
.card .meta{font-size:.78em;color:#88a;margin-top:3px}
.card .missing{opacity:.3;filter:grayscale(1)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;justify-content:center;align-items:center;padding:20px}
.overlay.active{display:flex}
.overlay img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:12px}
.overlay .close{position:fixed;top:20px;right:24px;color:#fff;font-size:2em;cursor:pointer;z-index:101}
.overlay .label{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#f0c040;font-size:1.2em;font-weight:700;z-index:101}
footer{text-align:center;padding:40px 20px;color:#556;font-size:.8em}
footer a{color:#0088cc;text-decoration:none}
.legend{display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.legend span{font-size:.75em;padding:3px 10px;border-radius:20px;border:1px solid #2a2a3a}
.legend .have{border-color:#66BB6A;color:#66BB6A}
.legend .miss{border-color:#555;color:#555}
</style></head><body>

</div>

const unique=ALL_BEASTS.filter(b=>{
  if(seen.has(b.name))return false;
  seen.add(b.name);return true;
});

const haveCount=Object.keys(FILE_MAP).length;
const totalSpecies=unique.length;
document.getElementById('count').textContent=`${haveCount} of ${totalSpecies} species illustrated (${Math.round(haveCount/totalSpecies*100)}%)`;

const grid=document.getElementById('grid');

  const hasIllust=FILE_MAP[b.name];
  const card=document.createElement('div');
  card.className='card';
  const imgSrc=hasIllust?`jp-illustrations/${FILE_MAP[b.name]}.png`:`https://www.kuroro.com/images/beasts/${String(b.id).padStart(3,'0')}.png`;

    document.getElementById('overlayImg').src=imgSrc;
    document.getElementById('overlayLabel').textContent=b.name+' — '+b.el;
    document.getElementById('overlay').classList.add('active');
  }}

});
