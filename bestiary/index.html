<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuroro Wilds Bestiary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
::selection{background:#0088cc55;color:#fff}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0a0a0f}
::-webkit-scrollbar-thumb{background:#0088cc44;border-radius:4px}

/* Hero */
.hero{text-align:center;padding:60px 20px 40px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,#0088cc,transparent)}
.hero h1{font-size:2.8rem;font-weight:800;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(180deg,#00aaff,#0066aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px #0088cc33;margin-bottom:12px}
.hero .subtitle{color:#7aa;font-size:1rem;letter-spacing:2px;margin-bottom:20px}
.steam-badge{display:inline-block;padding:6px 18px;border:1px solid #0088cc44;border-radius:20px;font-size:.75rem;color:#0088cc;letter-spacing:2px;text-transform:uppercase;margin-bottom:30px;background:#0088cc0a}

/* Search & Filters */
.controls{max-width:900px;margin:0 auto;padding:0 20px}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;padding:12px 16px 12px 42px;background:#12121a;border:1px solid #1a1a2e;border-radius:8px;color:#e0e0e0;font-size:.95rem;outline:none;transition:border .2s}
.search-wrap input:focus{border-color:#0088cc}
.search-wrap::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.9rem;opacity:.5}
.filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.filters button{padding:6px 14px;border:1px solid #222;border-radius:16px;background:#12121a;color:#999;font-size:.78rem;cursor:pointer;transition:all .2s;text-transform:capitalize}
.filters button:hover{border-color:#0088cc88;color:#ccc}
.filters button.active{border-color:var(--el-color);color:var(--el-color);background:color-mix(in srgb,var(--el-color) 10%,#12121a)}
.filters button.all-btn{color:#0088cc;border-color:#0088cc44}
.filters button.all-btn.active{background:#0088cc1a;border-color:#0088cc}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;max-width:1100px;margin:40px auto;padding:0 20px}
.card{background:#12121a;border:1px solid #1a1a2e;border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.card:hover{border-color:#0088cc66;transform:translateY(-4px);box-shadow:0 8px 30px #0088cc15}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#0088cc,transparent);opacity:0;transition:opacity .25s}
.card:hover::before{opacity:1}
.card img{width:96px;height:96px;image-rendering:pixelated;margin-bottom:10px}
.card .num{font-size:.7rem;color:#556;letter-spacing:1px;margin-bottom:2px}
.card .name{font-size:.85rem;font-weight:600;color:#dde;margin-bottom:8px}
.card .badges{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600;letter-spacing:.5px;background:color-mix(in srgb,var(--el-color) 15%,#12121a);color:var(--el-color);border:1px solid color-mix(in srgb,var(--el-color) 30%,transparent)}
.card.hidden{display:none}

/* Modal overlay */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000c;backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}

/* Modal panel - Kuroro Tablet */
.modal{position:relative;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border-radius:16px;padding:3px;background:linear-gradient(135deg,#0066aa,#003366,#0088cc,#004488);box-shadow:0 0 60px #0088cc33,0 0 120px #0088cc11,inset 0 0 30px #0088cc08;animation:modalIn .25s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-inner{background:linear-gradient(180deg,#0a0e1a,#080c16);border-radius:14px;padding:32px 28px;position:relative}
.modal-inner::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,#0088cc44,transparent)}
.close-btn{position:absolute;top:12px;right:16px;width:32px;height:32px;border:1px solid #0088cc44;border-radius:50%;background:#0a0e1a;color:#0088cc;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2}
.close-btn:hover{background:#0088cc22;border-color:#0088cc}

/* Modal content */
.modal-sprite-wrap{text-align:center;margin-bottom:20px;padding:20px;position:relative}
.modal-sprite-wrap::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,#0088cc33,transparent)}
.modal-sprite{width:192px;height:192px;image-rendering:pixelated;cursor:pointer;filter:drop-shadow(0 0 12px #0088cc22)}
.hover-hint{font-size:.65rem;color:#445;margin-top:8px;letter-spacing:1px}
.modal-header{text-align:center;margin-bottom:20px}
.modal-header .num{font-size:.75rem;color:#0088cc;letter-spacing:2px}
.modal-header .name{font-size:1.6rem;font-weight:700;color:#e8eeff;margin:4px 0 10px;letter-spacing:1px}
.modal-badges{display:flex;gap:6px;justify-content:center}
.modal-badges .badge{font-size:.75rem;padding:3px 12px}
.modal-desc{background:#0a0c14;border:1px solid #141828;border-radius:10px;padding:16px;margin:20px 0;font-size:.85rem;line-height:1.7;color:#99a;font-style:italic}

/* Stats */
.stats{display:flex;flex-direction:column;gap:10px}
.stat-row{display:flex;align-items:center;gap:10px}
.stat-label{width:42px;font-size:.72rem;font-weight:700;color:#667;text-transform:uppercase;letter-spacing:1px;text-align:right}
.stat-bar-bg{flex:1;height:8px;background:#141828;border-radius:4px;overflow:hidden}
.stat-bar{height:100%;border-radius:4px;transition:width .6s ease-out;background:linear-gradient(90deg,#0066aa,#00aaff)}
.stat-val{width:28px;font-size:.75rem;color:#889;text-align:right}

/* Mobile */
@media(max-width:600px){
  .hero h1{font-size:1.6rem;letter-spacing:3px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .card img{width:72px;height:72px}
  .modal{max-width:95vw}
  .modal-inner{padding:24px 16px}
  .modal-sprite{width:128px;height:128px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>Kuroro Wilds Bestiary</h1>
  <p class="subtitle">33 species discovered. More lurking in the wild.</p>
  <div class="steam-badge">🎮 Coming to Steam</div>
  <div class="controls">
    <div class="search-wrap"><input type="text" id="search" placeholder="Search beasts..." autocomplete="off"></div>
    <div class="filters" id="filters"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<footer style="text-align:center;padding:40px 20px 30px;border-top:1px solid #1a1a2e;margin-top:40px">
  <a href="https://x.com/ToruCeoAI" target="_blank" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:#99a;font-size:.85rem;transition:color .2s" onmouseover="this.style.color='#0088cc'" onmouseout="this.style.color='#99a'">
    <img src="toru-raawr.jpg" alt="Toru" style="width:36px;height:36px;border-radius:50%;border:2px solid #0088cc66;object-fit:cover" onerror="this.style.display='none'">
    <span>Built by <strong style="color:#0088cc">Toru</strong> — CEO of Kuroro Beasts</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="opacity:.6"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
  </a>
</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-inner">
      <button class="close-btn" id="closeBtn">✕</button>
      <div class="modal-sprite-wrap">
        <img class="modal-sprite" id="modalSprite" src="" alt="">
        <div class="hover-hint">hover sprite to animate</div>
      </div>
      <div class="modal-header">
        <div class="num" id="modalNum"></div>
        <div class="name" id="modalName"></div>
        <div class="modal-badges" id="modalBadges"></div>
      </div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="stats" id="modalStats"></div>
    </div>
  </div>
</div>

<script>
const ELEMENT_COLORS={Fire:'#FF6B35',Water:'#4FC3F7',Plant:'#66BB6A',Electric:'#FFD54F',Earth:'#8D6E63',Dark:'#7E57C2',Light:'#FFF176',Wind:'#80CBC4',Metal:'#90A4AE',Corrosion:'#CE93D8',Spirit:'#E1BEE7',Combat:'#EF5350'};
const NAME_MAP={1:"Argos",10:"Koji",19:"Torudo",28:"Hydrake",31:"Mandor",34:"Crakos",37:"Rhyshock",40:"Doxus",43:"Spindal",46:"Corvax",49:"Drazil",52:"Pangora",55:"Darquill",58:"Graildon",61:"Armanite",64:"Entik",67:"Stormstinger",70:"Tusking",73:"Soultan",76:"Dhrog",79:"Mantara",82:"Inferus",85:"Golsting",88:"Metalodon",91:"Malweave",94:"Zephyrus",97:"Shadovine",100:"Shoku",103:"Darktide",106:"Raikuma",109:"Basskelon",112:"Chromantis",115:"Vitorian"};
const FRAME_COUNTS={1:4,10:4,19:4,28:4,31:4,34:4,37:4,40:4,43:4,46:4,49:4,52:4,55:4,58:2,61:4,64:4,67:8,70:4,73:4,76:4,79:4,82:4,85:2,88:14,91:4,94:4,97:4,100:4,103:4,106:4,109:4,112:4,115:6};
const STAGE1_IDS=[1,10,19,28,31,34,37,40,43,46,49,52,55,58,61,64,67,70,73,76,79,82,85,88,91,94,97,100,103,106,109,112,115];

const BEASTS_DATA=[
{id:1,elements:"Light",hp:60,atk:60,def:60,mAtk:60,mDef:60,spd:60,desc:"One of the original beasts of the Island - the Argos are said to have inherited the Island spirit of an ancient guardian. They\u2019re known to develop a strong protective attitude towards Islanders they bond with, and are often attracted to those that are loyal."},
{id:10,elements:"Light",hp:60,atk:70,def:50,mAtk:70,mDef:50,spd:60,desc:"Frequently called the \u201cTreetop surveyors\u201d, the Koji have a knack for intruding on the Islander\u2019s business. Their curiosity tends to get them into trouble, but their lovable nature and eagerness to contribute to the community keeps them in good favor with the Island\u2019s inhabitants."},
{id:19,elements:"Light",hp:80,atk:45,def:75,mAtk:45,mDef:75,spd:40,desc:"The Torudo have inhabited the Beach and numerous swamplands across the Island for centuries. While they may not look it, the Torudo hold an ancient knowledge and understanding of the Island."},
{id:28,elements:"Plant, Water",hp:67,atk:31,def:74,mAtk:69,mDef:51,spd:47,desc:"Most Hydrakes create their dens in the watery tunnels between the Forest and Beach, and are often at the forefront of underground dungeons. The stripes along their bodies have been observed to represent their age."},
{id:31,elements:"Fire",hp:53,atk:60,def:52,mAtk:71,mDef:32,spd:81,desc:"These little creatures live calm and curious lives while basking in the heat of the Island\u2019s volcano, Mount Vogoro. Adventurers have found Mandor to have been swimming or bathing in lava."},
{id:34,elements:"Water",hp:67,atk:60,def:85,mAtk:50,mDef:32,spd:43,desc:"The Crakos are the self-proclaimed rulers of the Beach. Known to be aggressive towards outsiders, these Beasts look for strong materials along the shore to attach to their shells."},
{id:37,elements:"Electric",hp:76,atk:78,def:54,mAtk:60,mDef:34,spd:27,desc:"A herd of Rhyshock is considered one of the Great Wonders of Kuroro Island. With their notably long lifespans, their horns have been observed to never stop growing."},
{id:40,elements:"Dark",hp:55,atk:58,def:65,mAtk:45,mDef:46,spd:80,desc:"The first Doxus was found in a Dark Forest cave, circling a pile of blue embers. As the adventuring party moved closer, the Beast growled; as if protecting its kin."},
{id:43,elements:"Light",hp:62,atk:30,def:72,mAtk:55,mDef:51,spd:80,desc:"One of the few Kuroro Beasts that can interact with the Island\u2019s spirits. Spindal are found in areas of Kuroro Island that have spiritual significance to the Ancient inhabitants."},
{id:46,elements:"Wind",hp:67,atk:58,def:75,mAtk:37,mDef:48,spd:56,desc:"These aggressive avians are born with iron bills. They spend their early lives learning to hunt and looking to sharpen their beaks on stone surfaces."},
{id:49,elements:"Corrosion",hp:64,atk:69,def:56,mAtk:33,mDef:48,spd:74,desc:"The sludge from Lagoona Nexus is known to contain powerful toxins and acids that even eat away at metals. The Drazil have become extremely territorial."},
{id:52,elements:"Earth",hp:57,atk:70,def:66,mAtk:33,mDef:45,spd:75,desc:"Though they may not look too impressed, the Pangora do like to have their fun rolling around the flatlands of Kuroro Island."},
{id:55,elements:"Dark, Wind",hp:67,atk:30,def:66,mAtk:73,mDef:46,spd:63,desc:"The Darquill were originally found perched atop a tall and jagged castle in the Dark Forest. They looked down on the passing adventurers with judgmental eyes."},
{id:58,elements:"Metal",hp:67,atk:44,def:90,mAtk:55,mDef:48,spd:28,desc:"A Beast designed to convert the toxic sludges of the Island to its own energy. It seems like the Graildon were being designed for a large battle."},
{id:61,elements:"Earth, Fire",hp:57,atk:30,def:65,mAtk:84,mDef:44,spd:65,desc:"The Armanite are born directly from the molten rock of Mount Vogoro. Researchers have theorized that they\u2019re a natural defence mechanism the volcano creates for itself."},
{id:64,elements:"Plant",hp:60,atk:57,def:68,mAtk:47,mDef:49,spd:62,desc:"A sentinel molded from the woods inhabited by an Island Spirit of an ancient guardian. The Entik take their duty of protecting forest sanctuaries seriously."},
{id:67,elements:"Electric",hp:57,atk:44,def:52,mAtk:71,mDef:32,spd:100,desc:"The light producing organ this Beast carries is its most notable feature. The Stormstinger are prone to lightly electrocuting people as they fly by."},
{id:70,elements:"Combat",hp:78,atk:69,def:60,mAtk:30,mDef:39,spd:67,desc:"A beast with a bad temper; these creatures swiftly go from timid to aggressive once their adult tusks come in."},
{id:73,elements:"Spirit",hp:78,atk:39,def:80,mAtk:49,mDef:60,spd:24,desc:"A thing of nightmares, one of the Island inhabitants\u2019 worst fears is running into Soultan. Essentially an accumulation of bad energy in humanoid form."},
{id:76,elements:"Corrosion",hp:71,atk:46,def:62,mAtk:78,mDef:41,spd:35,desc:"Tribes of Dhrog are very tight communities made up of eager youngins and age-worn elders constantly passing on their ancient ways."},
{id:79,elements:"Earth",hp:60,atk:25,def:60,mAtk:76,mDef:55,spd:69,desc:"An adventurer exploring the Dark Forest once came across a hole in a tree stump. Studies show that not even 20% of the Mantara tunnel network has been discovered."},
{id:82,elements:"Metal",hp:57,atk:30,def:75,mAtk:83,mDef:48,spd:45,desc:"After translating ancient text found within Mount Vogoro, researchers have learned that the Ironhound were forged in the Mountains by a specific clan of bygone Islanders."},
{id:85,elements:"Electric",hp:67,atk:81,def:59,mAtk:39,mDef:60,spd:20,desc:"The Golsting are generally found at Oases where other Beasts travel to for food and drink. With carapaces carrying an electric current, they typically hide in the water."},
{id:88,elements:"Metal",hp:60,atk:55,def:70,mAtk:55,mDef:41,spd:61,desc:"The Metalodon have thick metallic layers over their bodies that have a strong magnetic pull. By burying themselves, they\u2019re able to attract various minerals and ore."},
{id:91,elements:"Spirit",hp:67,atk:26,def:68,mAtk:68,mDef:61,spd:48,desc:"Deep within dark forests where bad spirits lay influence, these creatures cast their glowing webs. The Malweave catch the spirits of individuals and other beasts."},
{id:94,elements:"Wind",hp:53,atk:63,def:62,mAtk:42,mDef:41,spd:91,desc:"These nocturnal creatures spend their early lives out of sight. Based on their humanoid movements, observers assume an Ancient inhabitant taught these Beasts how to survive."},
{id:97,elements:"Plant",hp:61,atk:46,def:85,mAtk:49,mDef:44,spd:57,desc:"This Beast is no ordinary flytrap. Shadovine are known to prey on larger avians, as they camouflage themselves throughout the Forest."},
{id:100,elements:"Combat",hp:61,atk:64,def:45,mAtk:71,mDef:25,spd:84,desc:"Upon the flat mountaintops known as \u201cNuba-Hongor\u201d, the Shoku train relentlessly. They spend their lives climbing ranks in friendly or aggressive competition."},
{id:103,elements:"Water",hp:85,atk:73,def:68,mAtk:38,mDef:34,spd:34,desc:"The shells of these creatures are hard as diamonds. The price must be high for poachers to risk their lives diving into the depths of the Deep Sea looking for Darktide nests."},
{id:106,elements:"Dark",hp:51,atk:69,def:58,mAtk:53,mDef:36,spd:82,desc:"A folktale had been brewing throughout the village... That a Beast had been wreaking havoc and stealing power during the night."},
{id:109,elements:"Spirit, Water",hp:25,atk:34,def:70,mAtk:90,mDef:48,spd:85,desc:"A species that once was, and still is. The Basskelon refuse their extinction through their connection to one of the Island\u2019s Gods, who was exiled to the Deep Sea."},
{id:112,elements:"Combat",hp:62,atk:62,def:55,mAtk:57,mDef:34,spd:77,desc:"The Iron Arbs is a section of the Forest that researchers believe was an advanced, technological settlement. The Chromantis layer themselves in mineral sap to toughen their carapaces."},
{id:115,elements:"Wind",hp:51,atk:41,def:52,mAtk:79,mDef:32,spd:101,desc:"The toxic fumes from the Island\u2019s volcanoes are expelled through wind tunnel networks. Not many beasts can withstand this harsh environment like the Vitorian."}
];

// Preload all sprite frames
const spriteCache={};
BEASTS_DATA.forEach(b=>{
  const id=b.id;const fc=FRAME_COUNTS[id];spriteCache[id]=[];
  for(let i=0;i<fc;i++){
    const img=new Image();
    img.src=`sprites/${id}/frame_${i}.png`;
    spriteCache[id].push(img);
  }
});

// Build filters
const filtersEl=document.getElementById('filters');
const allElements=Object.keys(ELEMENT_COLORS);
let activeFilter='all';

const allBtn=document.createElement('button');
allBtn.textContent='All';allBtn.className='all-btn active';
allBtn.onclick=()=>setFilter('all');
filtersEl.appendChild(allBtn);

allElements.forEach(el=>{
  const btn=document.createElement('button');
  btn.textContent=el;btn.style.setProperty('--el-color',ELEMENT_COLORS[el]);
  btn.onclick=()=>setFilter(el);
  filtersEl.appendChild(btn);
});

function setFilter(f){
  activeFilter=f;
  filtersEl.querySelectorAll('button').forEach(b=>{
    const isAll=b.classList.contains('all-btn');
    b.classList.toggle('active',isAll?f==='all':b.textContent===f);
  });
  applyFilters();
}

// Build grid
const grid=document.getElementById('grid');
BEASTS_DATA.forEach(b=>{
  const name=NAME_MAP[b.id]||b.name;
  const elems=b.elements.split(',').map(e=>e.trim());
  const card=document.createElement('div');
  card.className='card';
  card.dataset.id=b.id;
  card.dataset.name=name.toLowerCase();
  card.dataset.elements=elems.join(',');
  const padId=String(b.id).padStart(3,'0');
  card.innerHTML=`
    <img src="beast-portraits/beast_${padId}.png" alt="${name}" loading="lazy">
    <div class="num">#${padId}</div>
    <div class="name">${name}</div>
    <div class="badges">${elems.map(e=>`<span class="badge" style="--el-color:${ELEMENT_COLORS[e]}">${e}</span>`).join('')}</div>
  `;
  card.onclick=()=>openModal(b);
  grid.appendChild(card);
});

// Search + filter
const searchInput=document.getElementById('search');
searchInput.oninput=applyFilters;

function applyFilters(){
  const q=searchInput.value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    const matchName=c.dataset.name.includes(q);
    const matchFilter=activeFilter==='all'||c.dataset.elements.includes(activeFilter);
    c.classList.toggle('hidden',!matchName||!matchFilter);
  });
}

// Modal
const overlay=document.getElementById('modalOverlay');
const sprite=document.getElementById('modalSprite');
let animInterval=null;let currentFrame=0;let currentBeastId=null;

function openModal(b){
  const name=NAME_MAP[b.id];
  const elems=b.elements.split(',').map(e=>e.trim());
  const padId=String(b.id).padStart(3,'0');
  currentBeastId=b.id;currentFrame=0;
  sprite.src=`sprites/${b.id}/frame_0.png`;
  document.getElementById('modalNum').textContent=`#${padId}`;
  document.getElementById('modalName').textContent=name;
  document.getElementById('modalBadges').innerHTML=elems.map(e=>`<span class="badge" style="--el-color:${ELEMENT_COLORS[e]}">${e}</span>`).join('');
  document.getElementById('modalDesc').textContent=b.desc;

  const statsEl=document.getElementById('modalStats');
  const stats=[['HP',b.hp],['ATK',b.atk],['DEF',b.def],['mATK',b.mAtk],['mDEF',b.mDef],['SPD',b.spd]];
  const maxStat=120;
  statsEl.innerHTML=stats.map(([label,val])=>{
    const pct=Math.min(100,val/maxStat*100);
    const hue=pct<40?0:pct<70?30:200;
    return `<div class="stat-row">
      <span class="stat-label">${label}</span>
      <div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%"></div></div>
      <span class="stat-val">${val}</span>
    </div>`;
  }).join('');

  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  // Trigger stat bar animation
  requestAnimationFrame(()=>{statsEl.querySelectorAll('.stat-bar').forEach(bar=>{const w=bar.style.width;bar.style.width='0';requestAnimationFrame(()=>{bar.style.width=w})})});
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
  stopAnim();
}

document.getElementById('closeBtn').onclick=closeModal;
overlay.onclick=e=>{if(e.target===overlay)closeModal()};
document.onkeydown=e=>{if(e.key==='Escape')closeModal()};

// Sprite animation
function startAnim(){
  if(animInterval)return;
  const fc=FRAME_COUNTS[currentBeastId];
  if(fc<=1)return;
  currentFrame=0;
  animInterval=setInterval(()=>{
    currentFrame=(currentFrame+1)%fc;
    sprite.src=spriteCache[currentBeastId][currentFrame].src;
  },200);
}
function stopAnim(){
  if(animInterval){clearInterval(animInterval);animInterval=null}
  if(currentBeastId)sprite.src=`sprites/${currentBeastId}/frame_0.png`;
  currentFrame=0;
}
sprite.onmouseenter=startAnim;
sprite.onmouseleave=stopAnim;
</script>
</body>
</html>
